name: Python CI + npm (uv + Cloudsmith — wheel-only) 
 
on: 
  push:          { branches: ["main"] }
  pull_request:  { branches: ["main"] }
  workflow_dispatch: {}
 
permissions: 
  contents: read 
  id-token: write               # needed for Cloudsmith OIDC

env: 
  CS_ORG:   globex-innovations 
  CS_REPO:  python-services
  SERVICE:  gha-service      # Cloudsmith service-account
  
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
    - uses: actions/checkout@v4 
    - uses: actions/setup-python@v5
      with: { python-version: "3.12" }
    - uses: actions/setup-node@v4
      with: { node-version: "20" }

    # 1. OIDC login – populates $CLOUDSMITH_API_KEY
    - name: Cloudsmith OIDC login
      uses: cloudsmith-io/cloudsmith-cli-action@v1.0.2
      with:
        oidc-namespace:    ${{ env.CS_ORG }}
        oidc-service-slug: ${{ env.SERVICE }}
        oidc-auth-only:    "true"

    # 2. Install uv
    - name: Install uv
      run: |
        python -m pip install --upgrade pip
        pip install uv

    # 3. Configure uv to use Cloudsmith index
    - name: Configure uv index for Cloudsmith
      run: |
        echo "UV_INDEX_URL=https://token:${CLOUDSMITH_API_KEY}@dl.cloudsmith.io/basic/${{ env.CS_ORG }}/${{ env.CS_REPO }}/python/simple/" >> $GITHUB_ENV

    # 4. Install python dependencies via uv (we see the 403s here, if we try to consume a quarantined package)
    - name: Install dependencies with uv
      run: |
        if [ -f requirements.txt ]; then
          uv pip install --system -vv -r requirements.txt
        fi
        
     # 5. Configure npm to use Cloudsmith index
    - name: Configure npm index for Cloudsmith
      run: |
        npm config set registry https://dl.cloudsmith.io/basic/${{ env.CS_ORG }}/${{ env.CS_REPO }}/npm/
        npm config set //dl.cloudsmith.io/basic/${{ env.CS_ORG }}/${{ env.CS_REPO }}/npm/:_authToken ${CLOUDSMITH_API_KEY}

    # 5. Configure npm to use Cloudsmith index
    - name: Configure npm index for Cloudsmith
      run: |
        npm config set registry https://npm.cloudsmith.io/${{ env.CS_ORG }}/${{ env.CS_REPO }}/
        npm config set //npm.cloudsmith.io/${{ env.CS_ORG }}/${{ env.CS_REPO }}/:_authToken ${CLOUDSMITH_API_KEY}

    # 6. Install npm dependencies
    - name: Install dependencies with npm
      run: |
        if [ -f package.json ]; then
          npm install --verbose
        fi
